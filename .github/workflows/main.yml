
name: github action demo pipeline

on:
  push:
    branches:
      - main

jobs:
  extract-job:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Run extract_data.py
        run: python extract_data.py

  transform-job:
    runs-on: ubuntu-latest
    needs: extract-job
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Run transform_data.py 
        run: python transform_data.py

  load-job:
    runs-on: ubuntu-latest
    needs: transform-job
    steps:
        - name: checkout code
          uses: actions/checkout@v2

        - name: Run load_data.py
          run: python load_data.py
