
name: github action demo pipeline

on:
  push:
    branches:
      - main

jobs:
  job1:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Run message
        run: echo "job1....."

  job2:
    runs-on: ubuntu-latest
    needs: job1
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Run message
        run: echo "job2...."

  job3:
    runs-on: ubuntu-latest
    needs: job1
    steps:
        - name: checkout code
          uses: actions/checkout@v2

        - name: Run message
          run: echo "job3...."
  job4:
    runs-on: ubuntu-latest
    needs: job2
    steps:
      - name: checkout code
        uses: actions/checkout@v2

      - name: Run message
        run: echo "job4...."
  job5:
    runs-on: ubuntu-latest
    needs: job3
    steps:
      - name: checkout code
        uses: actions/checkout@v2

      - name: Run message
        run: echo "job5...."
  job6:
    runs-on: ubuntu-latest
    needs: [job4, job5]
    steps:
      - name: checkout code
        uses: actions/checkout@v2

      - name: Run message
        run: echo "job6...."